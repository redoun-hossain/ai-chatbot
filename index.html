<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Knowledge RAG Assistant</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Marked.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

    <!-- App CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar">

        <!-- Sidebar Header -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <!-- Robot Icon -->
                <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.07A7 7 0 0 1 14 23h-4a7 7 0 0 1-6.93-4H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM9.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
                <!-- Expand Icon (hover in collapsed) -->
                <div class="expand-icon" onclick="toggleSidebar()" title="Expand sidebar">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="14 9 17 12 14 15"/></svg>
                </div>
            </div>
            <span class="sidebar-title">Workspace</span>
            <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><polyline points="16 9 13 12 16 15"/></svg>
            </button>
        </div>

        <!-- New Chat -->
        <button class="new-chat-btn" onclick="newChat()">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>New Chat</span>
        </button>

        <!-- Search -->
        <div class="search-box">
            <span class="search-icon">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" class="search-input" placeholder="Search chats…">
            <span class="search-clear">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </span>
        </div>

        <!-- Chat Label -->
        <div class="chat-label">Recent</div>

        <!-- Chat List -->
        <div class="chat-list"></div>

        <!-- Footer -->
        <div class="sidebar-footer">
            <button class="sidebar-footer-btn theme-btn" onclick="toggleTheme()">
                <span class="theme-icon-slot">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </span>
                <span>Theme</span>
            </button>
            <button class="sidebar-footer-btn danger" onclick="clearAll()">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span>Clear</span>
            </button>
            <div class="sidebar-version"></div>
        </div>

    </aside>

    <!-- ═══ SIDEBAR OVERLAY (Mobile) ═══ -->
    <div class="sidebar-overlay"></div>

    <!-- ═══ MAIN ═══ -->
    <div class="main">

        <!-- Main Header -->
        <header class="main-header">
            <button class="hamburger" onclick="openMobileSidebar()">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="main-header-left">AI Knowledge RAG Assistant</span>
            <span class="main-header-center"></span>
            <span class="online-badge">
                <span class="online-dot"></span>
                Online
            </span>
        </header>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Welcome Screen -->
            <div class="welcome">
                <div class="welcome-logo">
                    <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.07A7 7 0 0 1 14 23h-4a7 7 0 0 1-6.93-4H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM9.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
                </div>
                <h1 class="welcome-title">AI Knowledge RAG Assistant</h1>
                <p class="welcome-sub">Ask questions from your knowledge base.</p>
                <div class="welcome-badges">
                    <span class="badge">🔒 Secure</span>
                    <span class="badge">⚡ Fast</span>
                    <span class="badge">🎯 Accurate</span>
                </div>
                <div class="welcome-composer composer">
                    <div class="composer-box">
                        <textarea id="welcome-textarea" rows="1" placeholder="Ask anything about your knowledge base…"></textarea>
                        <button id="welcome-send-btn" class="send-btn disabled">
                            <svg class="send-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            <svg class="spinner" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="composer-hint">Enter to send · Shift+Enter for new line</div>
                </div>
            </div>

            <!-- Chat View -->
            <div class="chat-view">
                <div class="messages">
                    <div class="messages-inner"></div>

                    <!-- Typing Indicator -->
                    <div class="typing-indicator">
                        <div class="message-avatar" style="background:linear-gradient(135deg,var(--primary),var(--accent));width:34px;height:34px;min-width:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.07A7 7 0 0 1 14 23h-4a7 7 0 0 1-6.93-4H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM9.5 16a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm5 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
                        </div>
                        <div class="typing-dots">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-text">Thinking…</span>
                        </div>
                    </div>
                </div>

                <!-- Chat Composer -->
                <div class="composer">
                    <div class="composer-box">
                        <textarea id="chat-textarea" rows="1" placeholder="Ask anything about your knowledge base…"></textarea>
                        <button id="chat-send-btn" class="send-btn disabled">
                            <svg class="send-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            <svg class="spinner" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="composer-hint">Enter to send · Shift+Enter for new line</div>
                </div>
            </div>

            <!-- Scroll Bottom Button -->
            <button class="scroll-bottom-btn" title="Scroll to bottom">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>

        </div>
    </div>

</div>

<!-- App JS -->
<script src="js/config.js"></script>
<script src="js/main.js"></script>

</body>
</html>
